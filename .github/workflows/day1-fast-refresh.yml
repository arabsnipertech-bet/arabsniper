name: Day1 Fast Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "30 8 * * *"
    - cron: "30 12 * * *"
    - cron: "30 16 * * *"

permissions:
  contents: write

concurrency:
  group: day1-fast-refresh
  cancel-in-progress: false

jobs:
  day1-fast-refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Day1 fast refresh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          API_SPORTS_KEY: ${{ secrets.API_SPORTS_KEY }}
          TZ: Europe/Rome
        run: python 3appDays.py --fast
