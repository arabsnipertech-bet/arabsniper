name: Day1 Fast Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "30 7 * * *"
    - cron: "30 11 * * *"
    - cron: "30 15 * * *"

permissions:
  contents: write

concurrency:
  group: day1-fast-refresh
  cancel-in-progress: false

jobs:
  day1-fast-refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure quote_history exists
        run: |
          test -f quote_history.json || echo "{}" > quote_history.json

      - name: Run Day1 fast refresh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          API_SPORTS_KEY: ${{ secrets.API_SPORTS_KEY }}
          TZ: Europe/Rome
          PYTHONUNBUFFERED: "1"
        run: python 3appDays_runner.py --fast-day1

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json data_day1.json details_day1.json quote_history.json || true
          git diff --cached --quiet || git commit -m "Day1 fast refresh update"
          git push
