name: Arab Sniper Daily Scan

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests pandas streamlit PyGithub  # Aggiunto streamlit qui

      - name: Run Scan Logic
        env:
          API_SPORTS_KEY: ${{ secrets.API_SPORTS_KEY }}
          GITHUB_TOKEN: ${{ secrets.MY_GIT_TOKEN }}
        run: python 3appDays.py --auto
        
