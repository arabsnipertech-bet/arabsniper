name: Arab Sniper Daily Scan

on:
  schedule:
    # Esegue all'01:00 UTC (circa le 02:00 italiane)
    - cron: '0 1 * * *'
  workflow_dispatch: # Permette di lanciarlo anche a mano da GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests pandas PyGithub
          
     - name: Run Scan Logic
        env:
          API_SPORTS_KEY: ${{ secrets.API_SPORTS_KEY }}
          GITHUB_TOKEN: ${{ secrets.MY_GIT_TOKEN }}  # Qui colleghiamo il nuovo nome
        run: python 3appDays\ \(14\).py --auto
