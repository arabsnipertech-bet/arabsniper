name: Update Casse Recenti

on:
  workflow_dispatch:
  schedule:
    # gira più volte al giorno, poi decide internamente se eseguire snapshot/build
    - cron: "5,20,35,50 * * * *"

permissions:
  contents: write

jobs:
  update-casse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Decide what to run (Europe/Rome)
        id: decide
        run: |
          python - <<'PY'
          from datetime import datetime
          from zoneinfo import ZoneInfo
          import os

          now = datetime.now(ZoneInfo("Europe/Rome"))
          hh = now.hour
          mm = now.minute

          run_snapshot = False
          run_build = False

          # Snapshot giornaliero:
          # finestra 10:05 / 10:20 / 10:35 / 10:50 ora italiana
          if hh == 10 and mm in (5, 20, 35, 50):
              run_snapshot = True

          # Build casse pomeriggio:
          # finestra 18:05 / 18:20 / 18:35 / 18:50
          if hh == 18 and mm in (5, 20, 35, 50):
              run_build = True

          # Build casse sera/notte:
          # finestra 23:05 / 23:20 / 23:35 / 23:50
          if hh == 23 and mm in (5, 20, 35, 50):
              run_build = True

          print(f"Europe/Rome now: {now.strftime('%Y-%m-%d %H:%M')}")
          print(f"run_snapshot={run_snapshot}")
          print(f"run_build={run_build}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"run_snapshot={'true' if run_snapshot else 'false'}\n")
              f.write(f"run_build={'true' if run_build else 'false'}\n")
          PY

      - name: Run snapshot_free_signals.py
        if: steps.decide.outputs.run_snapshot == 'true'
        run: |
          python snapshot_free_signals.py

      - name: Run build_casse_recenti.py
        if: steps.decide.outputs.run_build == 'true'
        run: |
          python build_casse_recenti.py

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add casse_recenti.json
          git add free_signals_*.json || true

          if git diff --cached --quiet; then
            echo "Nessuna modifica da committare."
            exit 0
          fi

          git commit -m "Auto update casse_recenti and free snapshots"
          git push
