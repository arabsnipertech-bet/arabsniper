name: Arab Sniper Fast Scan

on:
  schedule:
    - cron: '0 9,13,17,21 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install and Run Fast Scan Logic
        env:
          API_SPORTS_KEY: ${{ secrets.API_SPORTS_KEY }}
          GITHUB_TOKEN: ${{ secrets.MY_GIT_TOKEN }}
        run: |
          python -V
          which python
          python -m pip --version
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip list
          python -c "import streamlit; print('STREAMLIT OK:', streamlit.__version__)"
          python -c "import requests, pandas, github; print('DEPENDENCIES OK')"
          python 3appDays.py --fast
