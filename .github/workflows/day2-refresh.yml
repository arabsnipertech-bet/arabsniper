name: Day2 Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "10 20 * * *"

permissions:
  contents: write

concurrency:
  group: arabsniper-data-updates
  cancel-in-progress: false

jobs:
  day2-refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure quote_history exists
        run: |
          test -f quote_history.json || echo "{}" > quote_history.json

      - name: Run Day2 refresh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          API_SPORTS_KEY: ${{ secrets.API_SPORTS_KEY }}
          TZ: Europe/Rome
          PYTHONUNBUFFERED: "1"
        run: python 3appDays_runner.py --refresh-day2

      - name: Save generated files temporarily
        run: |
          mkdir -p /tmp/arabsniper_out
          cp -f data_day2.json /tmp/arabsniper_out/ 2>/dev/null || true
          cp -f details_day2.json /tmp/arabsniper_out/ 2>/dev/null || true
          cp -f quote_history.json /tmp/arabsniper_out/ 2>/dev/null || true

      - name: Refresh repo to latest main
        run: |
          git fetch origin main
          git reset --hard origin/main
          git clean -fd

      - name: Restore generated files
        run: |
          cp -f /tmp/arabsniper_out/data_day2.json . 2>/dev/null || true
          cp -f /tmp/arabsniper_out/details_day2.json . 2>/dev/null || true
          cp -f /tmp/arabsniper_out/quote_history.json . 2>/dev/null || true

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data_day2.json details_day2.json quote_history.json || true

          if git diff --cached --quiet; then
            echo "Nessuna modifica da committare"
            exit 0
          fi

          git commit -m "Day2 refresh update"
          git push origin main
