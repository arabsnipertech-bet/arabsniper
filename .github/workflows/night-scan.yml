name: Night Scan Guard

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: night-scan
  cancel-in-progress: true

jobs:
  night-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure quote_history exists
        run: |
          test -f quote_history.json || echo "{}" > quote_history.json

      - name: Run guarded night scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          API_SPORTS_KEY: ${{ secrets.API_SPORTS_KEY }}
          TZ: Europe/Rome
          PYTHONUNBUFFERED: "1"
        run: python scan_guard.py

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json data_day*.json details_day*.json quote_history.json archives/ || true
          git diff --cached --quiet || git commit -m "Night scan update"
          git push
